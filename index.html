<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロンプトマネージャー 高機能版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Marked (Markdown変換) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .resizer { cursor: col-resize; width: 4px; background-color: #f1f5f9; transition: background-color 0.2s; }
        .resizer:hover, .resizer:active { background-color: #3b82f6; }
        
        /* Markdown プレビュー用のスタイル */
        .markdown-body h1 { font-size: 1.5em; font-weight: bold; margin-bottom: 0.5em; border-bottom: 1px solid #eee; }
        .markdown-body h2 { font-size: 1.25em; font-weight: bold; margin-bottom: 0.5em; margin-top: 1em; }
        .markdown-body p { margin-bottom: 1em; }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5em; margin-bottom: 1em; }
        .markdown-body ol { list-style-type: decimal; margin-left: 1.5em; margin-bottom: 1em; }
        .markdown-body code { background: #f1f5f9; padding: 0.2em 0.4em; border-radius: 3px; font-family: monospace; }
        .markdown-body pre { background: #1e293b; color: #fff; padding: 1em; border-radius: 5px; overflow-x: auto; margin-bottom: 1em; }
        .markdown-body pre code { background: transparent; color: inherit; padding: 0; }
        .markdown-body blockquote { border-left: 4px solid #cbd5e1; padding-left: 1em; color: #64748b; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 h-screen overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            // ステート管理
            const [prompts, setPrompts] = useState([]);
            const [folders, setFolders] = useState([]);
            const [activeId, setActiveId] = useState(null);
            const [sidebarWidth, setSidebarWidth] = useState(280);
            const [copied, setCopied] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [viewMode, setViewMode] = useState('edit');
            
            const textareaRef = useRef(null);

            // 初回読み込み
            useEffect(() => {
                const savedPrompts = localStorage.getItem('pm_prompts');
                const savedFolders = localStorage.getItem('pm_folders');
                if (savedPrompts) setPrompts(JSON.parse(savedPrompts));
                if (savedFolders) setFolders(JSON.parse(savedFolders));
            }, []);

            // データ保存
            useEffect(() => {
                localStorage.setItem('pm_prompts', JSON.stringify(prompts));
                localStorage.setItem('pm_folders', JSON.stringify(folders));
            }, [prompts, folders]);

            const activePrompt = prompts.find(p => p.id === activeId);

            // 新規プロンプト作成
            const createPrompt = () => {
                const newPrompt = { id: Date.now().toString(), title: '無題のプロンプト', content: '', folderId: null, history: [] };
                setPrompts([newPrompt, ...prompts]);
                setActiveId(newPrompt.id);
                setViewMode('edit');
            };

            // 新規フォルダ作成
            const createFolder = () => {
                const name = prompt('フォルダ名を入力してください:');
                if (name) {
                    setFolders([...folders, { id: 'folder_' + Date.now(), name, isExpanded: true }]);
                }
            };

            const updatePrompt = (id, updates) => setPrompts(prompts.map(p => p.id === id ? { ...p, ...updates } : p));
            
            const deletePrompt = (id) => {
                if(confirm('このプロンプトを削除しますか？')) {
                    setPrompts(prompts.filter(p => p.id !== id));
                    if (activeId === id) setActiveId(null);
                }
            };

            const deleteFolder = (folderId, e) => {
                e.stopPropagation();
                if(confirm('フォルダを削除しますか？\n（中のプロンプトはフォルダ外に移動されます）')) {
                    setPrompts(prompts.map(p => p.folderId === folderId ? { ...p, folderId: null } : p));
                    setFolders(folders.filter(f => f.id !== folderId));
                }
            };

            // コピー機能
            const copyToClipboard = () => {
                if (!activePrompt) return;
                navigator.clipboard.writeText(activePrompt.content).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                });
            };

            // 履歴保存
            const saveHistory = () => {
                if (!activePrompt) return;
                const newHistory = [
                    { time: new Date().toLocaleString(), content: activePrompt.content },
                    ...(activePrompt.history || [])
                ].slice(0, 10); // 最大10件
                updatePrompt(activeId, { history: newHistory });
                alert('現在の状態を履歴に保存しました');
            };

            // ドラッグ＆ドロップ処理
            const onDragStart = (e, promptId) => {
                e.dataTransfer.setData('promptId', promptId);
            };
            const onDragOver = (e) => e.preventDefault();
            const onDropToFolder = (e, folderId) => {
                e.preventDefault();
                e.stopPropagation(); // バブリング（誤作動）を防止する処理を追加
                const promptId = e.dataTransfer.getData('promptId');
                if(promptId) updatePrompt(promptId, { folderId });
            };

            // ツールバー（エディタ操作）
            const insertText = (before, after = '') => {
                if (!textareaRef.current || !activePrompt) return;
                const textarea = textareaRef.current;
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                const text = textarea.value;
                const newText = text.substring(0, start) + before + text.substring(start, end) + after + text.substring(end);
                updatePrompt(activeId, { content: newText });
                
                setTimeout(() => {
                    textarea.focus();
                    textarea.setSelectionRange(start + before.length, end + before.length);
                }, 0);
            };

            const execUndo = () => document.execCommand('undo');
            const execRedo = () => document.execCommand('redo');

            // バックアップ機能
            const exportData = () => {
                const data = JSON.stringify({ prompts, folders });
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `prompt_backup_${new Date().toLocaleDateString().replace(/\//g, '')}.json`;
                a.click();
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if(data.prompts) setPrompts(data.prompts);
                        if(data.folders) setFolders(data.folders);
                        alert('データを復元しました。');
                    } catch (err) {
                        alert('ファイルの読み込みに失敗しました。');
                    }
                };
                reader.readAsText(file);
            };

            // サイドバーのリサイズ
            const startResizing = React.useCallback((mouseDownEvent) => {
                const startWidth = sidebarWidth;
                const startPosition = mouseDownEvent.clientX;
                const onMouseMove = (mouseMoveEvent) => {
                    const newWidth = startWidth + mouseMoveEvent.clientX - startPosition;
                    if (newWidth > 200 && newWidth < 600) setSidebarWidth(newWidth);
                };
                const onMouseUp = () => {
                    document.removeEventListener("mousemove", onMouseMove);
                    document.removeEventListener("mouseup", onMouseUp);
                };
                document.addEventListener("mousemove", onMouseMove);
                document.addEventListener("mouseup", onMouseUp);
            }, [sidebarWidth]);

            const filteredPrompts = prompts.filter(p => 
                p.title.toLowerCase().includes(searchTerm.toLowerCase()) || 
                p.content.toLowerCase().includes(searchTerm.toLowerCase())
            );

            // プロンプトアイテムのUI
            const PromptItem = ({ prompt }) => (
                <div 
                    draggable
                    onDragStart={(e) => onDragStart(e, prompt.id)}
                    onClick={() => setActiveId(prompt.id)}
                    className={`p-2 mb-1 rounded cursor-pointer border transition-all text-xs ${activeId === prompt.id ? 'bg-blue-50 border-blue-300 shadow-sm' : 'bg-white border-gray-100 hover:border-gray-300'}`}
                >
                    <div className="font-medium text-gray-800 truncate text-sm">{prompt.title || '無題'}</div>
                    <div className="text-gray-400 truncate mt-0.5">{prompt.content || '...'}</div>
                </div>
            );

            return (
                <div className="flex h-screen w-full font-sans">
                    
                    {/* --- 左側：サイドバー --- */}
                    <div 
                        className={`flex flex-col bg-slate-50 border-r border-slate-200 ${activeId ? 'hidden md:flex' : 'flex w-full'}`}
                        style={{ width: window.innerWidth >= 768 ? `${sidebarWidth}px` : '100%' }}
                    >
                        <div className="p-3 border-b bg-white flex flex-col gap-2">
                            <div className="flex justify-between items-center">
                                <h1 className="font-bold text-gray-700">プロンプト管理</h1>
                                <div className="flex gap-1">
                                    <button onClick={createFolder} className="p-1.5 text-gray-500 hover:bg-gray-100 rounded" title="フォルダ作成">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1h-3m-6 5a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h14a2 2 0 002-2v-6a2 2 0 00-2-2h-3z"></path></svg>
                                    </button>
                                    <button onClick={createPrompt} className="bg-blue-600 text-white p-1.5 rounded hover:bg-blue-700" title="プロンプト作成">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"></path></svg>
                                    </button>
                                </div>
                            </div>
                            <input 
                                type="text" 
                                placeholder="🔍 検索..." 
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                className="w-full text-sm p-1.5 border rounded outline-none focus:border-blue-400"
                            />
                        </div>

                        {/* ドラッグ＆ドロップ受け入れエリア（大外：フォルダ未分類へ） */}
                        <div className="flex-1 overflow-y-auto p-2" onDragOver={onDragOver} onDrop={(e) => onDropToFolder(e, null)}>
                            {/* フォルダ一覧 */}
                            {!searchTerm && folders.map(folder => (
                                <div key={folder.id} className="mb-2" onDragOver={onDragOver} onDrop={(e) => onDropToFolder(e, folder.id)}>
                                    <div 
                                        className="flex items-center justify-between p-1.5 bg-slate-200 text-slate-700 rounded cursor-pointer text-sm font-medium hover:bg-slate-300 transition"
                                        onClick={() => setFolders(folders.map(f => f.id === folder.id ? { ...f, isExpanded: !f.isExpanded } : f))}
                                    >
                                        <div className="flex items-center gap-1">
                                            <span>{folder.isExpanded ? '📂' : '📁'}</span> {folder.name}
                                        </div>
                                        <button onClick={(e) => deleteFolder(folder.id, e)} className="text-slate-400 hover:text-red-500">✕</button>
                                    </div>
                                    {folder.isExpanded && (
                                        <div className="pl-3 mt-1 border-l-2 border-slate-200 ml-2 min-h-[10px]" onDragOver={onDragOver} onDrop={(e) => onDropToFolder(e, folder.id)}>
                                            {filteredPrompts.filter(p => p.folderId === folder.id).map(p => <PromptItem key={p.id} prompt={p} />)}
                                        </div>
                                    )}
                                </div>
                            ))}

                            {/* フォルダ未分類 */}
                            <div className="mt-4 min-h-[50px]">
                                {!searchTerm && <div className="text-xs text-slate-400 mb-1 ml-1">フォルダ未分類（ここへドロップで移動）</div>}
                                {filteredPrompts.filter(p => searchTerm ? true : p.folderId === null).map(p => (
                                    <PromptItem key={p.id} prompt={p} />
                                ))}
                            </div>
                            
                            {prompts.length === 0 && <p className="text-slate-400 text-xs text-center mt-10">プロンプトがありません</p>}
                        </div>

                        <div className="p-2 border-t bg-slate-100 flex justify-between text-xs">
                            <button onClick={exportData} className="text-slate-600 hover:text-blue-600">📥 バックアップ</button>
                            <label className="text-slate-600 hover:text-blue-600 cursor-pointer">
                                📤 復元
                                <input type="file" accept=".json" className="hidden" onChange={importData} />
                            </label>
                        </div>
                    </div>

                    {/* リサイザー */}
                    <div className="hidden md:block resizer" onMouseDown={startResizing}></div>

                    {/* --- 右側：エディタ --- */}
                    <div className={`flex-1 flex flex-col bg-white ${!activeId ? 'hidden md:flex' : 'flex w-full'}`}>
                        {activePrompt ? (
                            <>
                                {/* ヘッダー */}
                                <div className="p-3 md:p-4 border-b bg-white">
                                    <div className="flex justify-between items-center mb-3">
                                        <button onClick={() => setActiveId(null)} className="md:hidden text-gray-500 flex items-center gap-1 text-sm bg-gray-100 px-2 py-1 rounded">
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"></path></svg>一覧へ
                                        </button>
                                        <div className="flex gap-2 ml-auto">
                                            <button onClick={() => deletePrompt(activePrompt.id)} className="px-3 py-1.5 text-xs font-bold text-red-500 border border-red-200 hover:bg-red-50 rounded transition">削除</button>
                                            <button onClick={saveHistory} className="px-3 py-1.5 text-xs font-bold text-slate-600 border border-slate-200 hover:bg-slate-50 rounded transition">履歴保存</button>
                                            <button onClick={copyToClipboard} className={`flex items-center gap-1 px-4 py-1.5 text-sm font-bold text-white rounded transition shadow-sm ${copied ? 'bg-green-500' : 'bg-blue-600 hover:bg-blue-700'}`}>
                                                {copied ? '✔ コピー完了' : '📋 コピー'}
                                            </button>
                                        </div>
                                    </div>

                                    <div className="flex flex-col gap-2">
                                        <input 
                                            type="text" 
                                            value={activePrompt.title}
                                            onChange={(e) => updatePrompt(activeId, { title: e.target.value })}
                                            placeholder="プロンプトのタイトル"
                                            className="text-xl md:text-2xl font-bold border-none outline-none w-full bg-transparent placeholder-gray-300 focus:ring-0"
                                        />
                                        {/* スマホでもフォルダ移動ができるセレクトボックス */}
                                        <div className="flex items-center gap-2 text-sm text-slate-500">
                                            <span>📁 所属フォルダ:</span>
                                            <select 
                                                value={activePrompt.folderId || ''} 
                                                onChange={(e) => updatePrompt(activeId, { folderId: e.target.value || null })}
                                                className="border rounded p-1 bg-slate-50 outline-none focus:border-blue-400"
                                            >
                                                <option value="">未分類</option>
                                                {folders.map(f => (
                                                    <option key={f.id} value={f.id}>{f.name}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                {/* ツールバー＆タブ */}
                                <div className="flex justify-between items-center bg-slate-50 border-b px-4 py-1 text-sm text-slate-600">
                                    <div className="flex gap-4">
                                        <button onClick={() => setViewMode('edit')} className={`py-2 border-b-2 ${viewMode==='edit'?'border-blue-500 text-blue-600 font-bold':'border-transparent hover:text-gray-800'}`}>✏️ 編集</button>
                                        <button onClick={() => setViewMode('preview')} className={`py-2 border-b-2 ${viewMode==='preview'?'border-blue-500 text-blue-600 font-bold':'border-transparent hover:text-gray-800'}`}>👁️ MDプレビュー</button>
                                    </div>
                                    
                                    {viewMode === 'edit' && (
                                        <div className="hidden md:flex gap-1 items-center border-l pl-3 ml-2">
                                            <button onClick={execUndo} className="p-1 hover:bg-slate-200 rounded" title="元に戻す">↩️</button>
                                            <button onClick={execRedo} className="p-1 hover:bg-slate-200 rounded" title="やり直し">↪️</button>
                                            <div className="w-px h-4 bg-slate-300 mx-1"></div>
                                            <button onClick={() => insertText('**', '**')} className="p-1 hover:bg-slate-200 rounded font-bold" title="太字">B</button>
                                            <button onClick={() => insertText('\n- ')} className="p-1 hover:bg-slate-200 rounded" title="リスト">📄</button>
                                        </div>
                                    )}
                                </div>

                                {/* 本文 */}
                                <div className="flex-1 p-4 flex flex-col relative overflow-hidden bg-gray-50">
                                    {viewMode === 'edit' ? (
                                        <>
                                            <textarea
                                                ref={textareaRef}
                                                value={activePrompt.content}
                                                onChange={(e) => updatePrompt(activeId, { content: e.target.value })}
                                                placeholder="ここにプロンプトを入力してください... (Markdown対応)"
                                                className="w-full flex-1 p-4 border border-gray-200 shadow-inner rounded bg-white outline-none focus:border-blue-400 resize-none font-mono text-sm leading-relaxed"
                                            ></textarea>
                                            
                                            {/* 履歴の復元 UI */}
                                            {activePrompt.history && activePrompt.history.length > 0 && (
                                                <div className="mt-3 p-2 bg-slate-100 rounded border border-slate-200">
                                                    <label className="text-xs text-slate-500 font-bold block mb-1">⏱ 過去の履歴から復元する</label>
                                                    <select 
                                                        className="w-full p-1 border rounded text-sm bg-white outline-none"
                                                        onChange={(e) => {
                                                            if(e.target.value !== "" && confirm('現在のテキストを上書きして復元しますか？')) {
                                                                updatePrompt(activeId, { content: e.target.value });
                                                                e.target.value = ""; // 選択リセット
                                                            }
                                                        }}
                                                    >
                                                        <option value="">履歴を選択...</option>
                                                        {activePrompt.history.map((h, i) => (
                                                            <option key={i} value={h.content}>{h.time}</option>
                                                        ))}
                                                    </select>
                                                </div>
                                            )}
                                        </>
                                    ) : (
                                        <div 
                                            className="w-full h-full p-4 border border-gray-200 rounded bg-white overflow-y-auto markdown-body"
                                            dangerouslySetInnerHTML={{ __html: marked.parse(activePrompt.content || '*プレビューするテキストがありません*') }}
                                        ></div>
                                    )}
                                </div>
                            </>
                        ) : (
                            <div className="flex-1 flex flex-col items-center justify-center text-slate-400 bg-slate-50">
                                <svg className="w-16 h-16 mb-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                                プロンプトを選択、または新しく作成してください
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
