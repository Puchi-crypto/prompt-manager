 <!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロンプトマネージャー スタイリッシュ版</title>

    <link rel="manifest" href="./manifest.webmanifest">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="./icon-192.png">
 
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .resizer { cursor: col-resize; width: 4px; background-color: #f8fafc; transition: background-color 0.2s; border-right: 1px solid #e2e8f0; }
        .resizer:hover, .resizer:active { background-color: #3b82f6; border-right-color: #3b82f6; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        .markdown-body h1 { font-size: 1.5em; font-weight: bold; margin-bottom: 0.5em; border-bottom: 1px solid #eee; padding-bottom: 0.2em;}
        .markdown-body h2 { font-size: 1.25em; font-weight: bold; margin-bottom: 0.5em; margin-top: 1em; color: #1e293b; }
        .markdown-body p { margin-bottom: 1em; line-height: 1.6; }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5em; margin-bottom: 1em; }
        .markdown-body ol { list-style-type: decimal; margin-left: 1.5em; margin-bottom: 1em; }
        .markdown-body code { background: #f1f5f9; padding: 0.2em 0.4em; border-radius: 3px; font-family: monospace; font-size: 0.9em; color: #db2777; }
        .markdown-body pre { background: #1e293b; color: #f8fafc; padding: 1em; border-radius: 5px; overflow-x: auto; margin-bottom: 1em; }
        .markdown-body pre code { background: transparent; color: inherit; padding: 0; }
        .markdown-body blockquote { border-left: 4px solid #cbd5e1; padding-left: 1em; color: #64748b; margin-left: 0; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 h-screen overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const defaultTemplates = [
            { id: 't1', name: '# 前提条件', text: '\n# 前提条件\n- ' },
            { id: 't2', name: '# 指示', text: '\n# 指示\n- ' },
            { id: 't3', name: '# 出力形式', text: '\n# 出力形式\n- ' },
            { id: 't4', name: '変数 [ ]', text: '[入力テキスト]' }
        ];

        const App = () => {
            const [prompts, setPrompts] = useState([]);
            const [folders, setFolders] = useState([]);
            const [templates, setTemplates] = useState(defaultTemplates);
            
            const [activeId, setActiveId] = useState(null);
            const [sidebarWidth, setSidebarWidth] = useState(260);
            const [copied, setCopied] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [viewMode, setViewMode] = useState('edit');
            
            const [isTemplateModalOpen, setIsTemplateModalOpen] = useState(false);
            const [editingTemplates, setEditingTemplates] = useState([]);

            const textareaRef = useRef(null);

            useEffect(() => {
                const savedPrompts = localStorage.getItem('pm_prompts');
                const savedFolders = localStorage.getItem('pm_folders');
                const savedTemplates = localStorage.getItem('pm_templates');
                
                if (savedPrompts) setPrompts(JSON.parse(savedPrompts));
                if (savedFolders) setFolders(JSON.parse(savedFolders));
                if (savedTemplates) setTemplates(JSON.parse(savedTemplates));
            }, []);

            useEffect(() => {
                localStorage.setItem('pm_prompts', JSON.stringify(prompts));
                localStorage.setItem('pm_folders', JSON.stringify(folders));
                localStorage.setItem('pm_templates', JSON.stringify(templates));
            }, [prompts, folders, templates]);

            const activePrompt = prompts.find(p => p.id === activeId);

            const createPrompt = () => {
                const newPrompt = { id: Date.now().toString(), title: '名称未設定', content: '', folderId: null, history: [] };
                setPrompts([newPrompt, ...prompts]);
                setActiveId(newPrompt.id);
                setViewMode('edit');
            };

            const createFolder = () => {
                const name = prompt('フォルダ名を入力してください:');
                if (name) setFolders([...folders, { id: 'folder_' + Date.now(), name, isExpanded: true }]);
            };

            const updatePrompt = (id, updates) => setPrompts(prompts.map(p => p.id === id ? { ...p, ...updates } : p));
            
            const deletePrompt = (id) => {
                if(confirm('このプロンプトを削除しますか？')) {
                    setPrompts(prompts.filter(p => p.id !== id));
                    if (activeId === id) setActiveId(null);
                }
            };

            const deleteFolder = (folderId, e) => {
                e.stopPropagation();
                if(confirm('フォルダを削除しますか？\n（中のプロンプトは未分類に移動します）')) {
                    setPrompts(prompts.map(p => p.folderId === folderId ? { ...p, folderId: null } : p));
                    setFolders(folders.filter(f => f.id !== folderId));
                }
            };

            const copyToClipboard = () => {
                if (!activePrompt) return;
                navigator.clipboard.writeText(activePrompt.content).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                });
            };

            const saveHistory = () => {
                if (!activePrompt) return;
                const newHistory = [{ time: new Date().toLocaleString(), content: activePrompt.content }, ...(activePrompt.history || [])].slice(0, 10);
                updatePrompt(activeId, { history: newHistory });
                alert('履歴に保存しました');
            };

            const openTemplateModal = () => {
                setEditingTemplates([...templates]);
                setIsTemplateModalOpen(true);
            };

            const saveTemplates = () => {
                const validTemplates = editingTemplates.filter(t => t.name.trim() !== '');
                setTemplates(validTemplates);
                setIsTemplateModalOpen(false);
            };

            // PC用ドラッグ＆ドロップ処理
            const onDragStart = (e, promptId) => e.dataTransfer.setData('promptId', promptId);
            const onDragOver = (e) => e.preventDefault();
            
            const onDropToItem = (e, targetFolderId, targetPromptId) => {
                e.preventDefault();
                e.stopPropagation();
                const draggedId = e.dataTransfer.getData('promptId');
                if (!draggedId || draggedId === targetPromptId) return;

                setPrompts(prev => {
                    const newArr = [...prev];
                    const dragIndex = newArr.findIndex(p => p.id === draggedId);
                    if(dragIndex === -1) return prev;
                    
                    const draggedItem = newArr[dragIndex];
                    draggedItem.folderId = targetFolderId;

                    newArr.splice(dragIndex, 1);

                    const targetIndex = newArr.findIndex(p => p.id === targetPromptId);
                    if(targetIndex !== -1) {
                        newArr.splice(targetIndex, 0, draggedItem);
                    } else {
                        newArr.unshift(draggedItem);
                    }
                    return newArr;
                });
            };

            const onDropToFolderOnly = (e, targetFolderId) => {
                e.preventDefault();
                e.stopPropagation();
                const draggedId = e.dataTransfer.getData('promptId');
                if (!draggedId) return;

                setPrompts(prev => {
                    const newArr = [...prev];
                    const dragIndex = newArr.findIndex(p => p.id === draggedId);
                    if(dragIndex === -1) return prev;

                    const draggedItem = newArr[dragIndex];
                    draggedItem.folderId = targetFolderId;
                    
                    newArr.splice(dragIndex, 1);
                    newArr.unshift(draggedItem);
                    return newArr;
                });
            };

            // スマホ対応：ボタンでの並び替え処理
            const movePrompt = (e, id, direction) => {
                e.stopPropagation();
                setPrompts(prev => {
                    const newArr = [...prev];
                    const index = newArr.findIndex(p => p.id === id);
                    if (index === -1) return prev;
                    
                    const targetFolderId = newArr[index].folderId;
                    let swapIndex = -1;

                    if (direction === 'up') {
                        for (let i = index - 1; i >= 0; i--) {
                            if (newArr[i].folderId === targetFolderId) {
                                swapIndex = i; break;
                            }
                        }
                    } else {
                        for (let i = index + 1; i < newArr.length; i++) {
                            if (newArr[i].folderId === targetFolderId) {
                                swapIndex = i; break;
                            }
                        }
                    }

                    if (swapIndex !== -1) {
                        const temp = newArr[index];
                        newArr[index] = newArr[swapIndex];
                        newArr[swapIndex] = temp;
                    }
                    return newArr;
                });
            };

            const insertText = (prefix, suffix = '') => {
                if (!textareaRef.current || !activePrompt) return;
                const textarea = textareaRef.current;
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                const text = textarea.value;
                const selectedText = text.substring(start, end);
                
                const newText = text.substring(0, start) + prefix + selectedText + suffix + text.substring(end);
                updatePrompt(activeId, { content: newText });
                
                setTimeout(() => {
                    textarea.focus();
                    if (selectedText.length > 0) {
                        textarea.setSelectionRange(start + prefix.length, end + prefix.length);
                    } else {
                        textarea.setSelectionRange(start + prefix.length, start + prefix.length);
                    }
                }, 0);
            };

            const exportData = () => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([JSON.stringify({ prompts, folders, templates })], { type: 'application/json' }));
                a.download = `prompt_backup_${new Date().toLocaleDateString().replace(/\//g, '')}.json`;
                a.click();
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if(data.prompts) setPrompts(data.prompts);
                        if(data.folders) setFolders(data.folders);
                        if(data.templates) setTemplates(data.templates);
                        alert('復元完了しました。');
                    } catch (err) { alert('読み込みに失敗しました。'); }
                };
                reader.readAsText(file);
            };

            const startResizing = React.useCallback((e) => {
                const startWidth = sidebarWidth;
                const startX = e.clientX;
                const onMouseMove = (me) => {
                    const newW = startWidth + me.clientX - startX;
                    if (newW > 180 && newW < 600) setSidebarWidth(newW);
                };
                const onMouseUp = () => {
                    document.removeEventListener("mousemove", onMouseMove);
                    document.removeEventListener("mouseup", onMouseUp);
                };
                document.addEventListener("mousemove", onMouseMove);
                document.addEventListener("mouseup", onMouseUp);
            }, [sidebarWidth]);

            const filteredPrompts = prompts.filter(p => p.title.toLowerCase().includes(searchTerm.toLowerCase()) || p.content.toLowerCase().includes(searchTerm.toLowerCase()));

            // リストに表示する項目UI（上下ボタン追加版）
            const PromptItem = ({ prompt, isFirst, isLast }) => (
                <div 
                    draggable 
                    onDragStart={(e) => onDragStart(e, prompt.id)} 
                    onDragOver={onDragOver}
                    onDrop={(e) => onDropToItem(e, prompt.folderId, prompt.id)}
                    onClick={() => setActiveId(prompt.id)}
                    className={`group p-1.5 mb-0.5 rounded cursor-pointer border transition-all relative flex justify-between items-center ${activeId === prompt.id ? 'bg-blue-50 border-blue-300' : 'bg-transparent border-transparent hover:bg-slate-200 hover:border-slate-300'}`}
                >
                    <div className="flex-1 min-w-0 pr-2">
                        <div className="font-bold text-gray-700 truncate text-xs">{prompt.title || '無題'}</div>
                        <div className="text-gray-400 truncate text-[10px] mt-0.5">{prompt.content || '...'}</div>
                    </div>
                    
                    {/* スマホでも確実に並び替えができるボタン (PCではホバー時のみ表示) */}
                    <div className="flex flex-col gap-0.5 md:opacity-0 group-hover:opacity-100 transition-opacity">
                        <button 
                            onClick={(e) => movePrompt(e, prompt.id, 'up')} 
                            className={`px-1.5 py-0.5 rounded border text-[10px] font-bold ${isFirst ? 'text-gray-300 border-gray-100 bg-transparent' : 'text-gray-500 hover:text-blue-600 bg-white border-gray-200 shadow-sm'}`}
                            disabled={isFirst}
                        >▲</button>
                        <button 
                            onClick={(e) => movePrompt(e, prompt.id, 'down')} 
                            className={`px-1.5 py-0.5 rounded border text-[10px] font-bold ${isLast ? 'text-gray-300 border-gray-100 bg-transparent' : 'text-gray-500 hover:text-blue-600 bg-white border-gray-200 shadow-sm'}`}
                            disabled={isLast}
                        >▼</button>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen w-full font-sans relative">
                    
                    {/* 左側：サイドバー */}
                    <div className={`flex flex-col bg-slate-100 ${activeId ? 'hidden md:flex' : 'flex w-full'}`} style={{ width: window.innerWidth >= 768 ? `${sidebarWidth}px` : '100%' }}>
                        
                        <div className="p-2 border-b bg-slate-100 flex flex-col gap-2 z-10">
                            <div className="flex justify-between items-center px-1">
                                <div className="font-bold text-gray-500 text-sm tracking-widest">PROMPTS</div>
                                <div className="flex gap-1.5">
                                    <button onClick={createFolder} className="p-1.5 text-gray-500 bg-white border border-gray-200 hover:bg-gray-50 rounded shadow-sm transition" title="フォルダ作成">
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1h-3m-6 5a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h14a2 2 0 002-2v-6a2 2 0 00-2-2h-3z"></path></svg>
                                    </button>
                                    <button onClick={createPrompt} className="p-1.5 bg-blue-600 text-white rounded hover:bg-blue-700 shadow-sm transition" title="新規プロンプト作成">
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"></path></svg>
                                    </button>
                                </div>
                            </div>
                            <div className="relative">
                                <span className="absolute left-2 top-1 text-gray-400 text-xs">🔍</span>
                                <input type="text" placeholder="検索..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full text-xs pl-6 p-1 border border-gray-200 rounded outline-none focus:border-blue-400 bg-white shadow-inner transition" />
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-1.5" onDragOver={onDragOver} onDrop={(e) => onDropToFolderOnly(e, null)}>
                            
                            {/* フォルダ一覧の表示 */}
                            {!searchTerm && folders.map(folder => {
                                const folderPrompts = filteredPrompts.filter(p => p.folderId === folder.id);
                                return (
                                <div key={folder.id} className="mb-1.5" onDragOver={onDragOver} onDrop={(e) => onDropToFolderOnly(e, folder.id)}>
                                    <div className="flex items-center justify-between px-1.5 py-1 bg-slate-200 text-slate-700 rounded cursor-pointer hover:bg-slate-300 transition"
                                        onClick={() => setFolders(folders.map(f => f.id === folder.id ? { ...f, isExpanded: !f.isExpanded } : f))}>
                                        <div className="flex items-center gap-1 font-bold text-xs">
                                            <span>{folder.isExpanded ? '📂' : '📁'}</span> {folder.name}
                                        </div>
                                        <button onClick={(e) => deleteFolder(folder.id, e)} className="text-slate-400 hover:text-red-500 text-xs">✕</button>
                                    </div>
                                    {folder.isExpanded && (
                                        <div className="pl-1 mt-0.5 border-l-2 border-slate-200 ml-2 min-h-[15px]" onDragOver={onDragOver} onDrop={(e) => onDropToFolderOnly(e, folder.id)}>
                                            {folderPrompts.map((p, index) => (
                                                <PromptItem 
                                                    key={p.id} 
                                                    prompt={p} 
                                                    isFirst={index === 0} 
                                                    isLast={index === folderPrompts.length - 1} 
                                                />
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )})}

                            {/* 未分類一覧の表示 */}
                            <div className="mt-3 min-h-[50px]">
                                {!searchTerm && <div className="text-[10px] text-slate-400 font-bold mb-1 ml-1 tracking-wider border-b pb-1">未分類</div>}
                                {(() => {
                                    const unclassifiedPrompts = filteredPrompts.filter(p => searchTerm ? true : p.folderId === null);
                                    return unclassifiedPrompts.map((p, index) => (
                                        <PromptItem 
                                            key={p.id} 
                                            prompt={p} 
                                            isFirst={index === 0} 
                                            isLast={index === unclassifiedPrompts.length - 1} 
                                        />
                                    ));
                                })()}
                            </div>
                        </div>

                        <div className="p-1 border-t border-slate-200 bg-slate-100 flex justify-between text-[10px] font-bold text-slate-400">
                            <button onClick={exportData} className="hover:text-blue-600 p-1">📥 バックアップ</button>
                            <label className="hover:text-blue-600 p-1 cursor-pointer">📤 復元<input type="file" accept=".json" className="hidden" onChange={importData} /></label>
                        </div>
                    </div>

                    <div className="hidden md:block resizer" onMouseDown={startResizing}></div>

                    {/* 右側：エディタ */}
                    <div className={`flex-1 flex flex-col bg-white ${!activeId ? 'hidden md:flex' : 'flex w-full'}`}>
                        {activePrompt ? (
                            <>
                                <div className="p-3 md:p-4 border-b bg-white">
                                    <div className="flex justify-between items-center mb-2">
                                        <button onClick={() => setActiveId(null)} className="md:hidden text-gray-600 flex items-center gap-1 text-sm bg-gray-100 px-3 py-1 rounded font-bold">← 戻る</button>
                                        <div className="flex gap-2 ml-auto">
                                            <button onClick={() => deletePrompt(activePrompt.id)} className="px-3 py-1.5 text-xs font-bold text-red-500 hover:bg-red-50 rounded">削除</button>
                                            <button onClick={saveHistory} className="px-3 py-1.5 text-xs font-bold text-slate-600 border border-slate-200 hover:bg-slate-50 rounded bg-white shadow-sm">履歴保存</button>
                                            <button onClick={copyToClipboard} className={`flex items-center gap-1 px-5 py-1.5 text-sm font-bold text-white rounded transition shadow ${copied ? 'bg-green-500' : 'bg-blue-600 hover:bg-blue-700'}`}>
                                                {copied ? '✔ コピー完了' : '📋 コピー'}
                                            </button>
                                        </div>
                                    </div>
                                    <div className="flex flex-col gap-2">
                                        <input type="text" value={activePrompt.title} onChange={(e) => updatePrompt(activeId, { title: e.target.value })}
                                            placeholder="プロンプトのタイトル" className="text-xl md:text-2xl font-bold border-none outline-none w-full bg-transparent placeholder-gray-300 focus:ring-0" />
                                        
                                        {/* フォルダ移動のセレクトボックス（スマホはここから確実に移動できます） */}
                                        <div className="flex items-center gap-2 text-xs text-slate-500 font-bold">
                                            📁 所属フォルダ: 
                                            <select value={activePrompt.folderId || ''} onChange={(e) => updatePrompt(activeId, { folderId: e.target.value || null })} className="border rounded p-0.5 bg-slate-50 outline-none focus:border-blue-400 font-normal">
                                                <option value="">未分類</option>
                                                {folders.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex flex-col sm:flex-row justify-between sm:items-center bg-slate-50 border-b px-2 sm:px-4 text-sm text-slate-600 overflow-x-auto hide-scrollbar">
                                    <div className="flex gap-4 border-b sm:border-none min-w-max">
                                        <button onClick={() => setViewMode('edit')} className={`py-2 px-1 border-b-2 transition ${viewMode==='edit'?'border-blue-500 text-blue-600 font-bold':'border-transparent hover:text-gray-800'}`}>✏️ 編集</button>
                                        <button onClick={() => setViewMode('preview')} className={`py-2 px-1 border-b-2 transition ${viewMode==='preview'?'border-blue-500 text-blue-600 font-bold':'border-transparent hover:text-gray-800'}`}>👁️ MDプレビュー</button>
                                    </div>
                                    
                                    {viewMode === 'edit' && (
                                        <div className="flex gap-1 items-center py-1 sm:py-0 sm:border-l sm:pl-3 sm:ml-2 min-w-max">
                                            <select 
                                                onChange={(e) => { 
                                                    if(e.target.value === 'edit') openTemplateModal();
                                                    else if(e.target.value) {
                                                        const tmpl = templates.find(t => t.id === e.target.value);
                                                        if(tmpl) insertText(tmpl.text); 
                                                    }
                                                    e.target.value=""; 
                                                }} 
                                                className="text-xs border border-gray-300 rounded bg-white p-1 mr-1 font-bold outline-none cursor-pointer"
                                            >
                                                <option value="">+ 定型文</option>
                                                {templates.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                                <option disabled>──────────</option>
                                                <option value="edit">⚙️ 定型文を編集...</option>
                                            </select>
                                            
                                            <div className="w-px h-4 bg-slate-300 mx-1"></div>
                                            
                                            <button onClick={() => insertText('**', '**')} className="w-7 h-7 flex items-center justify-center hover:bg-slate-200 rounded font-serif font-bold text-black" title="太字">B</button>
                                            <button onClick={() => insertText('*', '*')} className="w-7 h-7 flex items-center justify-center hover:bg-slate-200 rounded font-serif italic text-black" title="斜体">I</button>
                                            <button onClick={() => insertText('\n## ')} className="w-7 h-7 flex items-center justify-center hover:bg-slate-200 rounded font-bold text-black" title="見出し(H2)">H</button>
                                            <div className="w-px h-4 bg-slate-300 mx-1"></div>
                                            <button onClick={() => insertText('\n- ')} className="w-7 h-7 flex items-center justify-center hover:bg-slate-200 rounded font-bold" title="箇条書き">≡</button>
                                            <button onClick={() => insertText('\n1. ')} className="w-7 h-7 flex items-center justify-center hover:bg-slate-200 rounded font-bold" title="番号付きリスト">1.</button>
                                            <button onClick={() => insertText('\n> ')} className="w-7 h-7 flex items-center justify-center hover:bg-slate-200 rounded font-bold text-lg font-serif" title="引用">”</button>
                                            <button onClick={() => insertText('\n```\n', '\n```\n')} className="w-7 h-7 flex items-center justify-center hover:bg-slate-200 rounded font-bold text-xs" title="コードブロック">&lt;&gt;</button>
                                        </div>
                                    )}
                                </div>

                                <div className="flex-1 p-3 md:p-4 flex flex-col relative bg-gray-100 overflow-hidden">
                                    {viewMode === 'edit' ? (
                                        <>
                                            <textarea
                                                ref={textareaRef}
                                                value={activePrompt.content}
                                                onChange={(e) => updatePrompt(activeId, { content: e.target.value })}
                                                placeholder="ここにプロンプトを入力してください...&#13;&#10;上部のツールバーで装飾や定型文の挿入ができます。"
                                                className="w-full flex-1 p-4 border border-gray-300 shadow-inner rounded-t bg-white outline-none focus:border-blue-400 resize-none font-mono text-sm leading-relaxed"
                                            ></textarea>
                                            
                                            <div className="bg-white border border-t-0 border-gray-300 rounded-b px-3 py-1.5 flex justify-between items-center shadow-inner">
                                                <div className="text-xs font-bold text-gray-500">文字数: {activePrompt.content.length} 文字</div>
                                                {activePrompt.history && activePrompt.history.length > 0 && (
                                                    <select 
                                                        className="text-xs p-1 border rounded bg-slate-50 outline-none text-slate-600"
                                                        onChange={(e) => {
                                                            if(e.target.value !== "" && confirm('現在のテキストを上書きして復元しますか？')) {
                                                                updatePrompt(activeId, { content: e.target.value }); e.target.value = "";
                                                            }
                                                        }}
                                                    >
                                                        <option value="">⏱ 履歴から復元...</option>
                                                        {activePrompt.history.map((h, i) => <option key={i} value={h.content}>{h.time}</option>)}
                                                    </select>
                                                )}
                                            </div>
                                        </>
                                    ) : (
                                        <div 
                                            className="w-full h-full p-6 border border-gray-200 shadow-sm rounded bg-white overflow-y-auto markdown-body"
                                            dangerouslySetInnerHTML={{ __html: marked.parse(activePrompt.content || '*プレビューするテキストがありません*', { breaks: true }) }}
                                        ></div>
                                    )}
                                </div>
                            </>
                        ) : (
                            <div className="flex-1 flex flex-col items-center justify-center text-slate-400 bg-slate-50">
                                <svg className="w-16 h-16 mb-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                                プロンプトを選択、または新しく作成してください
                            </div>
                        )}
                    </div>

                    {isTemplateModalOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-lg shadow-xl w-full max-w-lg flex flex-col max-h-[90vh]">
                                <div className="p-4 border-b flex justify-between items-center bg-slate-50 rounded-t-lg">
                                    <h2 className="font-bold text-gray-800">⚙️ 定型文の編集</h2>
                                    <button onClick={() => setIsTemplateModalOpen(false)} className="text-gray-500 hover:text-gray-800 font-bold">✕</button>
                                </div>
                                <div className="p-4 overflow-y-auto flex-1 flex flex-col gap-4 bg-gray-50">
                                    {editingTemplates.map((tmpl, index) => (
                                        <div key={tmpl.id} className="bg-white p-3 border rounded shadow-sm relative">
                                            <button onClick={() => setEditingTemplates(editingTemplates.filter(t => t.id !== tmpl.id))} className="absolute top-2 right-2 text-red-400 hover:text-red-600 text-xs font-bold px-2 py-1 rounded bg-red-50">削除</button>
                                            <label className="block text-xs font-bold text-gray-600 mb-1">表示名 (リストに出る名前)</label>
                                            <input type="text" value={tmpl.name} onChange={(e) => { const newT = [...editingTemplates]; newT[index].name = e.target.value; setEditingTemplates(newT); }} className="w-full border p-1.5 rounded text-sm mb-2 outline-none focus:border-blue-400" placeholder="例: 前提条件" />
                                            <label className="block text-xs font-bold text-gray-600 mb-1">挿入されるテキスト</label>
                                            <textarea value={tmpl.text} onChange={(e) => { const newT = [...editingTemplates]; newT[index].text = e.target.value; setEditingTemplates(newT); }} className="w-full border p-2 rounded text-sm font-mono outline-none focus:border-blue-400 resize-y min-h-[60px]" placeholder="挿入したい内容を入力"></textarea>
                                        </div>
                                    ))}
                                    <button onClick={() => setEditingTemplates([...editingTemplates, { id: 't_' + Date.now(), name: '新しい定型文', text: '' }])} className="w-full py-3 border-2 border-dashed border-gray-300 text-gray-500 font-bold rounded hover:bg-gray-100 hover:border-gray-400 transition">＋ 定型文を追加する</button>
                                </div>
                                <div className="p-4 border-t flex justify-end gap-2 bg-white rounded-b-lg">
                                    <button onClick={() => setIsTemplateModalOpen(false)} className="px-4 py-2 border rounded text-sm font-bold text-gray-600 hover:bg-gray-50">キャンセル</button>
                                    <button onClick={saveTemplates} className="px-4 py-2 bg-blue-600 text-white rounded text-sm font-bold hover:bg-blue-700">保存して閉じる</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
 
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js")
            .then(() => console.log("Service Worker registered"))
            .catch((error) => console.log("Service Worker registration failed:", error));
        });
      }
    </script>
</body>
</html>
